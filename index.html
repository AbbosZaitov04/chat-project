<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simple Chat</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      width: 400px;
      background: #1e1e1e;
      border-radius: 10px;
      padding: 20px;
    }

    #messages {
      height: 300px;
      overflow-y: auto;
      border: 1px solid #333;
      padding: 10px;
      margin-bottom: 10px;
      background: #181818;
    }

    .message {
      margin-bottom: 8px;
      padding: 8px;
      background: #2b2b2b;
      border-radius: 5px;
    }

    .message-author {
      color: #81c784;
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .message-text {
      word-break: break-word;
    }

    .hidden {
      display: none;
    }

    #chatForm {
      display: flex;
      gap: 8px;
    }

    #chatInput {
      margin-bottom: 0;
    }

    #sendBtn {
      width: auto;
      min-width: 80px;
    }

    #status {
      min-height: 20px;
    }

    #currentUser {
      color: #bdbdbd;
      margin-top: -8px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      box-sizing: border-box;
      border: none;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      background: #4caf50;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }
  </style>
</head>
<body>

  <div class="container">

    <div id="registerView">

      <h1>Register</h1>

      <input
        type="text"
        id="username"
        placeholder="Username"
      >

      <input
        type="password"
        id="password"
        placeholder="Password"
      >

      <button id="registerBtn">
        Register
      </button>

      <p id="status"></p>

    </div>

    <div id="chatView" class="hidden">

      <h1>Chat</h1>

      <p id="currentUser"></p>

      <div id="messages"></div>

      <form id="chatForm">

        <input
          type="text"
          id="chatInput"
          placeholder="Message"
          autocomplete="off"
        >

        <button id="sendBtn" type="submit">
          Send
        </button>

      </form>

    </div>

  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="script.js"></script>

</body>
</html>
